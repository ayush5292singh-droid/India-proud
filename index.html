<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>India Explorer 🇮🇳</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🇮🇳 INDIA EXPLORER</h1>

<p>
Explore every state of India with facts, culture and history
</p>

</header>



<div class="search">

<input 
id="searchBox"
type="text"
placeholder="🔍 Search State"
>


<button onclick="searchState()">
Search
</button>


</div>



<div class="main">


<div class="mapBox">


<h2>🗺️ India Map</h2>


<div id="map">

 <div id="map">

<object 
data="india-map.svg"
type="image/svg+xml">
</object>

</div> 


</div>


</div>




<div class="infoBox" id="info">


<h2>
Welcome Explorer 👋
</h2>


<p>
Click any state to know:
</p>


<ul>

<li>🏛 Capital</li>

<li>👥 Population</li>

<li>🗣 Language</li>

<li>🍛 Food</li>

<li>🏞 Famous Places</li>

<li>🎭 Culture</li>

</ul>


</div>



</div>




<footer>

Made with ❤️ for India

</footer>



<script src="script.js"></script>


</body>

</html>
